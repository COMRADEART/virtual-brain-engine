name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so a fast follow-up push doesn't queue behind a stale one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck, build, unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # `npm run build` runs `tsc` (strict, noEmit type-check) then `vite build`,
      # so a type error or a broken bundle fails the job.
      - name: Build (type-check + bundle)
        run: npm run build

      # Pure unit tests only. `npm test` also chains verify:canvas + test:actions,
      # which need a live dev server + headless Chrome and are intentionally excluded here.
      - name: Unit tests
        run: npm run test:unit

  server:
    name: Server (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Type-check server
        working-directory: server
        run: npm run typecheck
